# GitHub Actions: baut Electron .exe + erstellt Release, sobald ein vX.Y.Z-Tag
# gepusht wird. electron-builder generiert dabei auch die latest.yml, die der
# electron-updater im Hintergrund abruft -> Auto-Update fuer alle Praxis-PCs.
#
# Release-Workflow:
#   1. package.json:version anpassen (z.B. 1.0.2 -> 1.1.0)
#   2. commit + push
#   3. git tag v1.1.0 && git push origin v1.1.0
#   4. Diese Action baut + published das Release
#   5. Beim naechsten App-Start ziehen alle Praxis-PCs das Update.

name: Release Electron App

on:
  push:
    tags:
      - 'v*'                # nur Version-Tags

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write       # noetig fuer Release-Creation via GITHUB_TOKEN

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # npm install (nicht ci) — toleriert Lockfile-Drift bis package-lock.json
      # mit neuen Dependencies lokal aktualisiert + committed wurde.
      - run: npm install --no-audit --no-fund

      - name: Build SPA
        run: npm run build

      - name: Build + publish Electron installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always
