# Automatischer Web-Deploy: bei jedem Push auf main wird gebaut und auf
# Firebase Hosting deployed — niemand kann mehr vergessen zu deployen.
#
# Voraussetzung: Repository-Secret FIREBASE_TOKEN (einmalig erzeugen mit
# `firebase login:ci` auf einem Rechner mit Browser). Fehlt das Secret,
# wird der Deploy-Schritt sauber uebersprungen (Build laeuft trotzdem als
# Kompilier-Check).
name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Unit-Tests
        run: npm test

      # Refdata-Artikelstamm frisch laden: die Datei ist gitignored (taeglich
      # ~2MB Churn), ein Build aus frischem Checkout enthielte sie sonst NICHT
      # — jedes Code-Push-Deployment loeschte damit die Medikamentensuche aus
      # dem Live-Hosting (bis zum naechsten 04:00-Refdata-Cron). Schlaegt der
      # Download fehl, wird als Fallback die aktuell live ausgelieferte Datei
      # uebernommen; schlaegt auch das fehl, laeuft der Deploy trotzdem
      # (Suche zeigt dann nur BAG-SL-Treffer, die im Repo liegen).
      - name: Refdata-Artikelstamm laden
        run: |
          node scripts/update-refdata.js --force || {
            echo "::warning::Refdata-Download fehlgeschlagen — versuche Live-Datei zu uebernehmen"
            curl -sf https://azsdb-999d6.web.app/refdata-data.json -o public/refdata-data.json \
              && head -c1 public/refdata-data.json | grep -q '[[{]' \
              || { echo "::warning::Auch Live-Fallback fehlgeschlagen — Deploy ohne Refdata"; rm -f public/refdata-data.json; }
          }

      - name: Build (Kompilier-Check auch ohne Deploy)
        run: npm run build

      - name: Deploy zu Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::notice::FIREBASE_TOKEN-Secret fehlt — Deploy uebersprungen. Einmalig 'firebase login:ci' ausfuehren und das Token als Repository-Secret FIREBASE_TOKEN hinterlegen."
            exit 0
          fi
          npx firebase-tools deploy --only hosting --project azsdb-999d6 --token "$FIREBASE_TOKEN"
