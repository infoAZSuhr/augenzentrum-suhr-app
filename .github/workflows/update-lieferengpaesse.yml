name: BWL Lieferengpässe aktualisieren

on:
  schedule:
    # Täglich 05:00 UTC = 06:00/07:00 Schweizer Zeit
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Dependencies installieren
        run: npm ci

      - name: BWL Lieferengpässe herunterladen
        run: node scripts/update-lieferengpaesse.js --force

      - name: App bauen
        run: npx vite build

      - name: Firebase Hosting deployen
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          npm install -g firebase-tools
          firebase deploy --only hosting --project azsdb-999d6 --non-interactive
          rm -f /tmp/sa.json

      - name: Meta-Datei committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add public/lieferengpaesse-meta.json
          git diff --staged --quiet || git commit -m "chore: BWL Lieferengpässe $(date +%d.%m.%Y)"
          git push
