name: Zur Rose Nota-Liste aktualisieren

on:
  schedule:
    # Täglich 06:00 UTC = 07:00/08:00 Schweizer Zeit
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Dependencies installieren
        run: npm install --no-audit --no-fund

      - name: Playwright + Stealth installieren (nur CI — gehört nicht zur App)
        # --no-save + --no-package-lock: package.json und lock bleiben unangetastet.
        # playwright-extra + stealth-plugin patcht WebDriver-Fingerprints, damit
        # Cloudflare den headless Chrome nicht als Bot erkennt. Ohne Stealth
        # bekamen wir seit Ende Mai 2026 dauerhaft local-fallback statt frischer
        # Daten — siehe scripts/update-zurrose.js Kommentar.
        run: |
          npm install playwright@^1.49.0 playwright-extra@^4.3.6 puppeteer-extra-plugin-stealth@^2.11.2 --no-save --no-package-lock --silent
          npx playwright install --with-deps chromium

      - name: Zur Rose Nota-Liste Firestore sync
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/update-zurrose.js --force

      - name: App bauen
        run: npx vite build

      - name: Firebase Hosting deployen
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          npm install -g firebase-tools
          firebase deploy --only hosting --project azsdb-999d6 --non-interactive
          rm -f /tmp/sa.json

      - name: Meta-Datei committen (Meta + XLSX falls aktualisiert)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add public/zurrose-nota-meta.json scripts/Nota-Liste.xlsx 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: Zur Rose Nota-Liste $(date +%d.%m.%Y)"
          git push
