name: Zur Rose Nota-Liste aktualisieren

on:
  schedule:
    # Täglich 06:00 UTC = 07:00/08:00 Schweizer Zeit
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Auch manuell im GitHub-Interface auslösbar (Actions → Run workflow)

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Dependencies installieren
        run: npm ci

      - name: Zur Rose Nota-Liste herunterladen
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
          # Schritt 1: Elternseite aufrufen → Session-Cookie holen
          curl -s -L -c /tmp/zr-cookies.txt -b /tmp/zr-cookies.txt \
            -A "$UA" \
            "https://www.zurrose.ch/apothekenpartner/bestellsysteme/nota-liste" > /dev/null
          # Schritt 2: Datei mit Cookie herunterladen
          curl -L -s \
            -A "$UA" \
            -H "Accept: application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/octet-stream,*/*" \
            -H "Referer: https://www.zurrose.ch/apothekenpartner/bestellsysteme/nota-liste" \
            -c /tmp/zr-cookies.txt -b /tmp/zr-cookies.txt \
            -o /tmp/Nota-Liste.xlsx \
            "https://www.zurrose.ch/sites/default/files/media/downloads/Nota-Liste.xlsx"
          SIZE=$(du -k /tmp/Nota-Liste.xlsx | cut -f1)
          echo "Heruntergeladen: ${SIZE} KB"
          # Prüfe Magic Bytes (PK = ZIP = XLSX)
          if ! xxd -l 2 /tmp/Nota-Liste.xlsx | grep -q "504b"; then
            echo "FEHLER: Keine XLSX-Datei (erwartet PK Magic Bytes)"
            xxd -l 200 /tmp/Nota-Liste.xlsx
            exit 1
          fi
          echo "✓ XLSX-Datei bestätigt"

      - name: Zur Rose Nota-Liste Firestore sync
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ZURROSE_XLSX_PATH: /tmp/Nota-Liste.xlsx
        run: node scripts/update-zurrose.js --force

      - name: Meta-Datei committen (falls geändert)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/zurrose-nota-meta.json
          git diff --staged --quiet || git commit -m "chore: Zur Rose Nota-Liste $(date +%d.%m.%Y)"
          git push
