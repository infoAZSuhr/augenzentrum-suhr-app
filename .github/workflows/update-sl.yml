name: BAG Spezialitätenliste aktualisieren

on:
  schedule:
    # Täglich 04:30 UTC = 05:30/06:30 Schweizer Zeit
    - cron: '30 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Dependencies installieren
        run: npm ci

      - name: Playwright + Stealth installieren (nur CI — BAG ist SPA)
        # BAG-SL ist eine OAuth-geschützte Angular-SPA, kein direkter XLSX-
        # Download mehr verfügbar. Wir navigieren mit Headless Chrome durch
        # die SPA und klicken den Excel-Download-Button — analog zur Zur-
        # Rose-Lösung. --no-save + --no-package-lock damit Playwright nicht
        # in die App-Dependencies wandert.
        run: |
          npm install playwright@^1.49.0 playwright-extra@^4.3.6 puppeteer-extra-plugin-stealth@^2.11.2 --no-save --no-package-lock --silent
          npx playwright install --with-deps chromium

      - name: BAG Spezialitätenliste herunterladen
        run: node scripts/update-sl.js --force

      - name: App bauen
        run: npx vite build

      - name: Firebase Hosting deployen
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          npm install -g firebase-tools
          firebase deploy --only hosting --project azsdb-999d6 --non-interactive
          rm -f /tmp/sa.json

      - name: Meta-Datei committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add public/sl-meta.json
          git diff --staged --quiet || git commit -m "chore: BAG Spezialitätenliste $(date +%d.%m.%Y)"
          git push
