name: Seed TARDOC-SOPs in Firestore

# Manueller Trigger über GitHub-UI:
#   Actions → "Seed TARDOC-SOPs in Firestore" → Run workflow → Branch=main
#
# Voraussetzung: nur das bestehende Secret FIREBASE_SERVICE_ACCOUNT
# (wird bereits von deploy.yml genutzt). Keine zusätzlichen Secrets nötig.
#
# Das Skript ist idempotent: Falls die Section "H – TARDOC-Abrechnung & Tarife"
# bereits existiert, wird sie nicht doppelt angelegt — der Run bricht sauber ab.
# Falls neu geseedet werden soll: vorher in der App die Section löschen.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: seed-tardoc-sops
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Dependencies installieren
        run: npm ci

      - name: Seed-Skript ausführen
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::Secret FIREBASE_SERVICE_ACCOUNT ist nicht gesetzt."
            echo "::error::Wird vom Auto-Deploy-Workflow auch benötigt — bitte prüfen."
            exit 1
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          node scripts/seed-tardoc-sops.mjs
          rm -f /tmp/sa.json
